name: rust-build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false        # one platform failing won't cancel the other
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            bin: slimenrf-serial-gui
          - os: windows-latest
            name: windows
            bin: slimenrf-serial-gui.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2   # caches deps per-OS, big speedup on reruns

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: slimenrf-serial-gui-${{ matrix.name }}
          path: target/release/${{ matrix.bin }}
