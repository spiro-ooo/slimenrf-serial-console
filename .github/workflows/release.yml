name: Release

# Manual "Run workflow" button in the Actions tab. You type the version (e.g.
# v0.2.0); the workflow builds the Linux and Windows binaries and publishes a
# GitHub Release with both attached.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.2.0)"
        required: true
        type: string
      draft:
        description: "Create as a draft (don't publish immediately)"
        required: false
        type: boolean
        default: false

# Creating a release + pushing the tag needs write access to the repo contents.
# (GITHUB_TOKEN is read-only by default in many repos, so this is required.)
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            bin: slimenrf-serial-gui
            asset: slimenrf-serial-gui-linux-x86_64
          - os: windows-latest
            name: windows-x86_64
            bin: slimenrf-serial-gui.exe
            asset: slimenrf-serial-gui-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v5

      # Linux build needs libudev (serial port enumeration) and the usual
      # X11/Wayland + GL dev libraries that eframe links against.
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libudev-dev \
            libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libxkbcommon-dev libwayland-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        # Add --locked once Cargo.lock is committed for reproducible builds.
        run: cargo build --release

      # Rename the binary to a per-platform asset name so the two builds don't
      # collide as release assets.
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cp target/release/${{ matrix.bin }} ${{ matrix.asset }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: copy target\release\${{ matrix.bin }} ${{ matrix.asset }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Pull both platform binaries (each job uploaded one) into ./dist.
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          draft: ${{ inputs.draft }}
          generate_release_notes: true
          files: dist/*
